apiVersion: ironic.openstack.org/v1beta1
kind: Ironic
metadata:
  name: ironic
spec:
  standalone: true
  serviceUser: ironic
  customServiceConfig: |
    [DEFAULT]
    debug = true
  databaseInstance: openstack
  storageClass: local-storage
  ironicAPI: {}
  ironicConductors:
  - storageRequest: 10G
  ironicInspector:
    customServiceConfig: |
      [DEFAULT]
      debug = true
  ironicNeutronAgent:
    replicas: 0  # Neutron agent replicas is zero, i.e disabled for standalone.
    customServiceConfig: |
      [DEFAULT]
      debug = true
  secret: osp-secret
