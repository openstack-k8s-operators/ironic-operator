[DEFAULT]
# API-specific configuration overrides

[cors]
allowed_origin=*
allow_credentials=true
expose_headers=Content-Type,Cache-Control,Content-Language,Expires,Last-Modified,Pragma
max_age=3600
allow_methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
allow_headers=Content-Type,Cache-Control,Content-Language,Expires,Last-Modified,Pragma,X-Auth-Token

[oslo_middleware]
enable_proxy_headers_parsing=true

{{if .Standalone}}
[ironic]
auth_type=none
{{else}}
[ironic]
auth_url={{ .KeystoneInternalURL }}
auth_type={{ if .UseApplicationCredentials }}v3applicationcredential{{ else }}password{{ end }}
{{ if .UseApplicationCredentials -}}
application_credential_id = {{ .ACID }}
application_credential_secret = {{ .ACSecret }}
{{- else -}}
username={{ .ServiceUser }}
password = {{ .ServicePassword }}
user_domain_name=Default
project_name=service
project_domain_name=Default
{{- end }}
max_retries=6
retry_interval=10

[keystone_authtoken]
auth_url={{ .KeystoneInternalURL }}
www_authenticate_uri={{ .KeystonePublicURL }}
auth_type={{ if .UseApplicationCredentials }}v3applicationcredential{{ else }}password{{ end }}
{{ if .UseApplicationCredentials -}}
application_credential_id = {{ .ACID }}
application_credential_secret = {{ .ACSecret }}
{{- else -}}
username={{ .ServiceUser }}
password = {{ .ServicePassword }}
project_domain_name=Default
user_domain_name=Default
project_name=service
{{- end }}

[service_catalog]
auth_url={{ .KeystoneInternalURL }}
auth_type={{ if .UseApplicationCredentials }}v3applicationcredential{{ else }}password{{ end }}
{{ if .UseApplicationCredentials -}}
application_credential_id = {{ .ACID }}
application_credential_secret = {{ .ACSecret }}
{{- else -}}
username={{ .ServiceUser }}
password = {{ .ServicePassword }}
user_domain_name=Default
project_name=service
project_domain_name=Default
{{- end }}

[glance]
auth_url={{ .KeystoneInternalURL }}
auth_type={{ if .UseApplicationCredentials }}v3applicationcredential{{ else }}password{{ end }}
{{ if .UseApplicationCredentials -}}
application_credential_id = {{ .ACID }}
application_credential_secret = {{ .ACSecret }}
{{- else -}}
username={{ .ServiceUser }}
password = {{ .ServicePassword }}
project_domain_name=Default
project_name=services
user_domain_name=Default
{{- end }}

[neutron]
auth_url={{ .KeystoneInternalURL }}
auth_type={{ if .UseApplicationCredentials }}v3applicationcredential{{ else }}password{{ end }}
{{ if .UseApplicationCredentials -}}
application_credential_id = {{ .ACID }}
application_credential_secret = {{ .ACSecret }}
{{- else -}}
username={{ .ServiceUser }}
password = {{ .ServicePassword }}
project_domain_name=Default
project_name=services
user_domain_name=Default
{{- end }}

[nova]
auth_url={{ .KeystoneInternalURL }}
auth_type={{ if .UseApplicationCredentials }}v3applicationcredential{{ else }}password{{ end }}
{{ if .UseApplicationCredentials -}}
application_credential_id = {{ .ACID }}
application_credential_secret = {{ .ACSecret }}
{{- else -}}
username={{ .ServiceUser }}
password = {{ .ServicePassword }}
project_domain_name=Default
project_name=services
user_domain_name=Default
{{- end }}
{{end}}

{{ if (index . "QuorumQueues") }}
[oslo_messaging_rabbit]
rabbit_quorum_queue=true
rabbit_transient_quorum_queue=true
amqp_durable_queues=true
{{ end }}
